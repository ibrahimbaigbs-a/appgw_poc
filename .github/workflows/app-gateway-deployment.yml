name: app-gateway-deployment

on:
  pull_request:
    paths:
      - .github/workflows/app-gateway-deployment.yml
      - deployment/**
      - env/**
      - modules/app-gateway/**
  workflow_dispatch:
    inputs:
      environment:
        description: Environment folder under env/ (for example Prod)
        required: true
        default: Prod
        type: string
      appcode:
        description: App code folder under env/<Env>/ (for example App-001)
        required: true
        default: App-001
        type: string
      instance:
        description: Instance pair folder (for example appgw-01)
        required: true
        default: appgw-01
        type: string
      role:
        description: Gateway role file to target within the instance folder
        required: true
        default: both
        type: choice
        options:
          - both
          - p
          - s
      operation:
        description: Terraform operation to run
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: Type DESTROY to confirm a destroy operation
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: app-gateway-deployment-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_WORKING_DIR: deployment
  TERRAFORM_VERSION: 1.9.8
  TF_STATE_CONTAINER: tfstate

jobs:
  detect-scope:
    name: Detect Changed Instances
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scope.outputs.matrix }}
      has_scope: ${{ steps.scope.outputs.has_scope }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed instance pairs
        id: scope
        shell: bash
        run: |
          all_env_json=""
          changed=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.role }}" = "both" ]; then
              matrix=$(jq -cn \
                --arg env "${{ inputs.environment }}" \
                --arg app "${{ inputs.appcode }}" \
                --arg ins "${{ inputs.instance }}" \
                '[
                  {environment:$env, appcode:$app, instance:$ins, role:"p"},
                  {environment:$env, appcode:$app, instance:$ins, role:"s"}
                ]')
            else
              matrix=$(jq -cn \
                --arg env "${{ inputs.environment }}" \
                --arg app "${{ inputs.appcode }}" \
                --arg ins "${{ inputs.instance }}" \
                --arg role "${{ inputs.role }}" \
                '[{environment:$env, appcode:$app, instance:$ins, role:$role}]')
            fi

            echo "::notice::Manual target -> env=${{ inputs.environment }}, appcode=${{ inputs.appcode }}, instance=${{ inputs.instance }}, role=${{ inputs.role }}"
          else
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"

            all_env_json=$(git diff --name-status "$base_sha" "$head_sha" \
              | awk -F'\t' '
                  function print_if_env_json(path) {
                    if (path ~ /^env\/.+\/.+\/.+\/.+\.json$/) print path;
                  }
                  {
                    status = $1;
                    if (status ~ /^R[0-9]+$/ || status ~ /^C[0-9]+$/) {
                      print_if_env_json($2);
                      print_if_env_json($3);
                    } else {
                      print_if_env_json($2);
                    }
                  }
                ' \
              | sort -u)

            changed=$(git diff --name-status "$base_sha" "$head_sha" \
              | awk -F'\t' '
                  function emit_scope(path, a, role) {
                    if (path !~ /^env\/.+\/.+\/.+\/.+-[ps]\.json$/) return;
                    split(path, a, "/");
                    role = "";
                    if (a[5] ~ /-p\.json$/) role = "p";
                    else if (a[5] ~ /-s\.json$/) role = "s";
                    if (role != "") print a[2] ":" a[3] ":" a[4] ":" role;
                  }
                  {
                    status = $1;
                    if (status ~ /^R[0-9]+$/ || status ~ /^C[0-9]+$/) {
                      emit_scope($2);
                      emit_scope($3);
                    } else {
                      emit_scope($2);
                    }
                  }
                ' \
              | sort -u)

            if [ -z "$changed" ]; then
              matrix='[]'
            else
              matrix=$(echo "$changed" | while IFS=':' read -r env_name appcode_name instance_name role_name; do
                jq -cn \
                  --arg env "$env_name" \
                  --arg app "$appcode_name" \
                  --arg ins "$instance_name" \
                  --arg role "$role_name" \
                  '{environment:$env, appcode:$app, instance:$ins, role:$role}'
              done | jq -sc '.')
            fi

            if [ -n "$all_env_json" ]; then
              echo "::notice::Changed env JSON files:"
              echo "$all_env_json"
            fi
          fi

          has_scope=$([ "$matrix" != "[]" ] && echo true || echo false)

          if [ "$has_scope" = "true" ]; then
            echo "::notice::Deployment scope matrix: $matrix"
          else
            echo "::warning::No deployable *-p.json or *-s.json changes detected in this run."
          fi

          {
            echo "### Detect Scope"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "- Trigger: workflow_dispatch"
              echo "- Target: env=${{ inputs.environment }}, appcode=${{ inputs.appcode }}, instance=${{ inputs.instance }}, role=${{ inputs.role }}"
            else
              echo "- Trigger: pull_request"
              if [ -n "$all_env_json" ]; then
                echo "- Changed env JSON files:"
                echo '```text'
                echo "$all_env_json"
                echo '```'
              else
                echo "- Changed env JSON files: none"
              fi
            fi
            echo "- has_scope: $has_scope"
            echo "- matrix:"
            echo '```json'
            echo "$matrix" | jq .
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "has_scope=$has_scope" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

  plan:
    name: Plan - ${{ matrix.environment }} / ${{ matrix.appcode }} / ${{ matrix.instance }} / ${{ matrix.role }}
    needs: [detect-scope, validate]
    if: needs.detect-scope.outputs.has_scope == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.operation != 'destroy')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-scope.outputs.matrix) }}

    environment: azure-${{ matrix.environment }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ matrix.environment }}/${{ matrix.appcode }}/${{ matrix.instance }}/${{ matrix.role }}/terraform.tfstate"

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="environment=${{ matrix.environment }}" \
            -var="appcode=${{ matrix.appcode }}" \
            -var="instance=${{ matrix.instance }}" \
            -var="role=${{ matrix.role }}" \
            -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-${{ matrix.environment }}-${{ matrix.appcode }}-${{ matrix.instance }}-${{ matrix.role }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          if-no-files-found: error

  apply:
    name: Apply - ${{ matrix.environment }} / ${{ matrix.appcode }} / ${{ matrix.instance }} / ${{ matrix.role }}
    needs: [detect-scope, plan]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'apply'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-scope.outputs.matrix) }}

    environment: azure-${{ matrix.environment }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ matrix.environment }}/${{ matrix.appcode }}/${{ matrix.instance }}/${{ matrix.role }}/terraform.tfstate"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: plan-${{ matrix.environment }}-${{ matrix.appcode }}-${{ matrix.instance }}-${{ matrix.role }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          while true; do
            echo "Terraform apply attempt ${attempt}/${max_attempts}"
            if terraform apply -auto-approve tfplan; then
              break
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Terraform apply failed after ${max_attempts} attempts"
              exit 1
            fi

            sleep_seconds=$((attempt * 30))
            echo "Apply failed. Retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

      - name: Terraform output
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output

  destroy-guard:
    name: Destroy Confirmation Guard
    needs: [detect-scope]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'destroy' && github.event.inputs.confirm_destroy != 'DESTROY'
    runs-on: ubuntu-latest
    steps:
      - name: Fail without explicit confirmation
        run: |
          echo "::error::Destroy requested but confirmation is missing. Re-run with confirm_destroy=DESTROY."
          exit 1

  destroy:
    name: Destroy - ${{ matrix.environment }} / ${{ matrix.appcode }} / ${{ matrix.instance }} / ${{ matrix.role }}
    needs: [detect-scope, validate]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'destroy' && github.event.inputs.confirm_destroy == 'DESTROY' && needs.detect-scope.outputs.has_scope == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-scope.outputs.matrix) }}

    environment: azure-${{ matrix.environment }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ matrix.environment }}/${{ matrix.appcode }}/${{ matrix.instance }}/${{ matrix.role }}/terraform.tfstate"

      - name: Terraform destroy plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -destroy \
            -var="environment=${{ matrix.environment }}" \
            -var="appcode=${{ matrix.appcode }}" \
            -var="instance=${{ matrix.instance }}" \
            -var="role=${{ matrix.role }}" \
            -out=tfdestroy

      - name: Terraform destroy apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfdestroy
