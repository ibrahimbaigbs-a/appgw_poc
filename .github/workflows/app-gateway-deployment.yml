name: app-gateway-deployment

on:
  pull_request:
    paths:
      - .github/workflows/app-gateway-deployment.yml
      - deployment/**
      - env/**
      - modules/app-gateway/**
  workflow_dispatch:
    inputs:
      environment:
        description: Environment folder under env/ (for example Prod)
        required: true
        default: Prod
        type: string
      region:
        description: Region folder under env/<Env>/Region/ (for example Westus-2)
        required: true
        default: Westus-2
        type: string
      instance:
        description: Instance pair folder (for example appgw-01)
        required: true
        default: appgw-01
        type: string
      role:
        description: Gateway role file to target within the instance folder
        required: true
        default: both
        type: choice
        options:
          - both
          - p
          - s
      operation:
        description: Terraform operation to run
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write

concurrency:
  group: app-gateway-deployment-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_WORKING_DIR: deployment
  TERRAFORM_VERSION: 1.9.8
  TF_STATE_CONTAINER: tfstate

jobs:
  detect-scope:
    name: Detect Changed Instances
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scope.outputs.matrix }}
      has_scope: ${{ steps.scope.outputs.has_scope }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed instance pairs
        id: scope
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.role }}" = "both" ]; then
              matrix=$(jq -cn \
                --arg env "${{ inputs.environment }}" \
                --arg reg "${{ inputs.region }}" \
                --arg ins "${{ inputs.instance }}" \
                '[
                  {environment:$env, region:$reg, instance:$ins, role:"p"},
                  {environment:$env, region:$reg, instance:$ins, role:"s"}
                ]')
            else
              matrix=$(jq -cn \
                --arg env "${{ inputs.environment }}" \
                --arg reg "${{ inputs.region }}" \
                --arg ins "${{ inputs.instance }}" \
                --arg role "${{ inputs.role }}" \
                '[{environment:$env, region:$reg, instance:$ins, role:$role}]')
            fi
          else
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"

            changed=$(git diff --name-only "$base_sha" "$head_sha" \
              | grep -E '^env/.+/Region/.+/.+/.+-[ps]\.json$' \
              | awk -F'/' '{
                  role="";
                  if ($6 ~ /-p\.json$/) role="p";
                  else if ($6 ~ /-s\.json$/) role="s";
                  if (role != "") print $2 ":" $4 ":" $5 ":" role;
                }' \
              | sort -u)

            if [ -z "$changed" ]; then
              matrix='[]'
            else
              matrix=$(echo "$changed" | while IFS=':' read -r env_name region_name instance_name role_name; do
                jq -cn \
                  --arg env "$env_name" \
                  --arg reg "$region_name" \
                  --arg ins "$instance_name" \
                  --arg role "$role_name" \
                  '{environment:$env, region:$reg, instance:$ins, role:$role}'
              done | jq -sc '.')
            fi
          fi

          has_scope=$([ "$matrix" != "[]" ] && echo true || echo false)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "has_scope=$has_scope" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

  plan:
    name: Plan - ${{ matrix.environment }} / ${{ matrix.region }} / ${{ matrix.instance }} / ${{ matrix.role }}
    needs: [detect-scope, validate]
    if: needs.detect-scope.outputs.has_scope == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-scope.outputs.matrix) }}

    environment: azure-${{ matrix.environment }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ matrix.environment }}/${{ matrix.region }}/${{ matrix.instance }}/${{ matrix.role }}/terraform.tfstate"

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="environment=${{ matrix.environment }}" \
            -var="region=${{ matrix.region }}" \
            -var="instance=${{ matrix.instance }}" \
            -var="role=${{ matrix.role }}" \
            -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: plan-${{ matrix.environment }}-${{ matrix.region }}-${{ matrix.instance }}-${{ matrix.role }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          if-no-files-found: error

  apply:
    name: Apply - ${{ matrix.environment }} / ${{ matrix.region }} / ${{ matrix.instance }} / ${{ matrix.role }}
    needs: [detect-scope, plan]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.operation == 'apply'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-scope.outputs.matrix) }}

    environment: azure-${{ matrix.environment }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ matrix.environment }}/${{ matrix.region }}/${{ matrix.instance }}/${{ matrix.role }}/terraform.tfstate"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: plan-${{ matrix.environment }}-${{ matrix.region }}-${{ matrix.instance }}-${{ matrix.role }}
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform output
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform output
