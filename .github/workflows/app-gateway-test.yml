name: app-gateway-test

on:
  pull_request:
    paths:
      - .github/workflows/app-gateway-test.yml
      - examples/app-gateway-test/**
      - modules/app-gateway/**
  workflow_dispatch:
    inputs:
      operation:
        description: Terraform operation to run for the example deployment
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
      destroy_after_apply:
        description: Destroy the test deployment after a successful apply
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: app-gateway-test-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_WORKING_DIR: examples/app-gateway-test
  TERRAFORM_VERSION: 1.9.8

jobs:
  validate:
    name: Validate Example
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Show tool versions
        run: |
          terraform version
          tflint --version

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Initialize TFLint plugins
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive

  deploy-test:
    name: Test Deployment
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    environment: azure-test
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_gateways: ${{ secrets.TF_VAR_GATEWAYS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-gateway-test-plan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          if-no-files-found: error

      - name: Terraform apply
        if: github.event.inputs.operation == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform destroy
        if: github.event.inputs.operation == 'apply' && github.event.inputs.destroy_after_apply == 'true'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -auto-approve
